<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="url(#grad)" stroke="#fff" stroke-width="1"/>
  
  <!-- Book/Receipt icon -->
  <rect x="8" y="7" width="16" height="18" rx="1" fill="#fff" opacity="0.95"/>
  
  <!-- Receipt lines -->
  <line x1="11" y1="11" x2="21" y2="11" stroke="#4F46E5" stroke-width="1.5"/>
  <line x1="11" y1="14" x2="19" y2="14" stroke="#4F46E5" stroke-width="1.5"/>
  <line x1="11" y1="17" x2="20" y2="17" stroke="#4F46E5" stroke-width="1.5"/>
  <line x1="11" y1="20" x2="18" y2="20" stroke="#4F46E5" stroke-width="1.5"/>
  
  <!-- Dollar sign -->
  <circle cx="16" cy="14" r="3" fill="#10B981"/>
  <text x="16" y="16" text-anchor="middle" fill="#fff" font-family="Arial" font-size="4" font-weight="bold">$</text>
</svg>

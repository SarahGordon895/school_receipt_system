  <text x="50" y="468" font-family="Arial" font-size="10">PK = Primary Key</text>
  <text x="50" y="484" font-family="Arial" font-size="10">FK = Foreign Key</text>
  <text x="120" y="468" font-family="Arial" font-size="10">1 = One</text>
  <text x="120" y="484" font-family="Arial" font-size="10">N = Many</text>

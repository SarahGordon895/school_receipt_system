  <text x="548" y="198" font-family="Arial" font-size="10">1</text>
  <text x="610" y="340" font-family="Arial" font-size="10">N</text>

  <!-- Attribute ovals (sample like handwritten ERD) -->
  <ellipse cx="250" cy="95" rx="48" ry="16" fill="white" stroke="black" stroke-width="1"/>
  <text x="250" y="99" text-anchor="middle" font-family="Arial" font-size="9">admin_id (PK)</text>
  <line x1="220" y1="105" x2="170" y2="95" stroke="black" stroke-width="1"/>

  <ellipse cx="485" cy="95" rx="40" ry="16" fill="white" stroke="black" stroke-width="1"/>
  <text x="485" y="99" text-anchor="middle" font-family="Arial" font-size="9">reg_no (PK)</text>

<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="420" height="700" viewBox="0 0 420 700">
  <rect width="100%" height="100%" fill="white"/>
  <text x="210" y="28" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold">ACTIVITY DIAGRAM</text>
  <text x="210" y="48" text-anchor="middle" font-family="Arial" font-size="11">Parent Uploads Bank Payment Proof</text>

  <rect x="30" y="60" width="360" height="610" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="210" y="80" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold">Parent</text>

  <circle cx="210" cy="105" r="7" fill="black"/>

  <rect x="95" y="125" width="230" height="34" rx="12" ry="12" fill="white" stroke="black" stroke-width="1.5"/>
  <text x="210" y="146" text-anchor="middle" font-family="Arial" font-size="11">Login (phone + password)</text>
  <line x1="210" y1="112" x2="210" y2="125" stroke="black" stroke-width="1.5"/>

  <rect x="95" y="175" width="230" height="34" rx="12" ry="12" fill="white" stroke="black" stroke-width="1.5"/>
  <text x="210" y="196" text-anchor="middle" font-family="Arial" font-size="11">View child fee balance</text>
  <line x1="210" y1="159" x2="210" y2="175" stroke="black" stroke-width="1.5"/>

  <rect x="95" y="225" width="230" height="34" rx="12" ry="12" fill="white" stroke="black" stroke-width="1.5"/>
  <text x="210" y="246" text-anchor="middle" font-family="Arial" font-size="11">Pay at school bank account</text>
  <line x1="210" y1="209" x2="210" y2="225" stroke="black" stroke-width="1.5"/>

  <rect x="95" y="275" width="230" height="34" rx="12" ry="12" fill="white" stroke="black" stroke-width="1.5"/>
  <text x="210" y="296" text-anchor="middle" font-family="Arial" font-size="11">Upload bank receipt PDF</text>
  <line x1="210" y1="259" x2="210" y2="275" stroke="black" stroke-width="1.5"/>

  <polygon points="210,330 270,360 210,390 150,360" fill="white" stroke="black" stroke-width="1.5"/>
  <text x="210" y="364" text-anchor="middle" font-family="Arial" font-size="11">Valid proof?</text>
  <line x1="210" y1="309" x2="210" y2="330" stroke="black" stroke-width="1.5"/>

  <text x="225" y="353" font-family="Arial" font-size="10">yes</text>
  <rect x="95" y="410" width="230" height="34" rx="12" ry="12" fill="white" stroke="black" stroke-width="1.5"/>
  <text x="210" y="431" text-anchor="middle" font-family="Arial" font-size="11">System verifies payment</text>
  <line x1="210" y1="390" x2="210" y2="410" stroke="black" stroke-width="1.5"/>

  <polygon points="210,465 270,495 210,525 150,495" fill="white" stroke="black" stroke-width="1.5"/>
  <text x="210" y="499" text-anchor="middle" font-family="Arial" font-size="10">Approved?</text>
  <line x1="210" y1="444" x2="210" y2="465" stroke="black" stroke-width="1.5"/>

  <text x="225" y="488" font-family="Arial" font-size="10">yes</text>
  <rect x="95" y="545" width="230" height="34" rx="12" ry="12" fill="white" stroke="black" stroke-width="1.5"/>
  <text x="210" y="566" text-anchor="middle" font-family="Arial" font-size="11">Save payment &amp; notify parent</text>
  <line x1="210" y1="525" x2="210" y2="545" stroke="black" stroke-width="1.5"/>

  <text x="72" y="353" font-family="Arial" font-size="10">no</text>
  <rect x="30" y="410" width="150" height="34" rx="12" ry="12" fill="white" stroke="black" stroke-width="1.5"/>
  <text x="105" y="431" text-anchor="middle" font-family="Arial" font-size="10">Show error message</text>
  <line x1="150" y1="360" x2="105" y2="410" stroke="black" stroke-width="1.5"/>

  <text x="72" y="488" font-family="Arial" font-size="10">no</text>
  <rect x="30" y="545" width="150" height="34" rx="12" ry="12" fill="white" stroke="black" stroke-width="1.5"/>
  <text x="105" y="566" text-anchor="middle" font-family="Arial" font-size="10">Wait for bursar review</text>
  <line x1="150" y1="495" x2="105" y2="545" stroke="black" stroke-width="1.5"/>

  <circle cx="210" cy="630" r="7" fill="black"/>
  <circle cx="210" cy="630" r="12" fill="none" stroke="black" stroke-width="1.5"/>
  <line x1="210" y1="579" x2="210" y2="618" stroke="black" stroke-width="1.5"/>
  <line x1="105" y1="579" x2="105" y2="630" stroke="black" stroke-width="1.5"/>
  <line x1="105" y1="630" x2="198" y2="630" stroke="black" stroke-width="1.5"/>

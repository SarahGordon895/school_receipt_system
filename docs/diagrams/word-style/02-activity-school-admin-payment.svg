<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="420" height="620" viewBox="0 0 420 620">
  <rect width="100%" height="100%" fill="white"/>
  <text x="210" y="28" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold">ACTIVITY DIAGRAM</text>
  <text x="210" y="48" text-anchor="middle" font-family="Arial" font-size="11">School Admin Records Payment</text>

  <rect x="30" y="60" width="360" height="530" fill="none" stroke="black" stroke-width="1.5"/>
  <text x="210" y="80" text-anchor="middle" font-family="Arial" font-size="12" font-weight="bold">School Admin</text>

  <!-- start -->
  <circle cx="210" cy="105" r="7" fill="black"/>

  <!-- actions -->
  <rect x="95" y="125" width="230" height="34" rx="12" ry="12" fill="white" stroke="black" stroke-width="1.5"/>
  <text x="210" y="146" text-anchor="middle" font-family="Arial" font-size="11">Login (School Admin)</text>
  <line x1="210" y1="112" x2="210" y2="125" stroke="black" stroke-width="1.5"/>

  <rect x="95" y="180" width="230" height="34" rx="12" ry="12" fill="white" stroke="black" stroke-width="1.5"/>
  <text x="210" y="201" text-anchor="middle" font-family="Arial" font-size="11">Enter payment details</text>
  <line x1="210" y1="159" x2="210" y2="180" stroke="black" stroke-width="1.5"/>

  <!-- decision -->
  <polygon points="210,235 270,265 210,295 150,265" fill="white" stroke="black" stroke-width="1.5"/>
  <text x="210" y="269" text-anchor="middle" font-family="Arial" font-size="11">Valid data?</text>
  <line x1="210" y1="214" x2="210" y2="235" stroke="black" stroke-width="1.5"/>

  <!-- yes path -->
  <text x="225" y="258" font-family="Arial" font-size="10">yes</text>
  <rect x="95" y="315" width="230" height="34" rx="12" ry="12" fill="white" stroke="black" stroke-width="1.5"/>
  <text x="210" y="336" text-anchor="middle" font-family="Arial" font-size="11">Save payment record</text>
  <line x1="210" y1="295" x2="210" y2="315" stroke="black" stroke-width="1.5"/>

  <rect x="95" y="365" width="230" height="34" rx="12" ry="12" fill="white" stroke="black" stroke-width="1.5"/>
  <text x="210" y="386" text-anchor="middle" font-family="Arial" font-size="11">Update student balance</text>
  <line x1="210" y1="349" x2="210" y2="365" stroke="black" stroke-width="1.5"/>

  <rect x="95" y="415" width="230" height="34" rx="12" ry="12" fill="white" stroke="black" stroke-width="1.5"/>
  <text x="210" y="436" text-anchor="middle" font-family="Arial" font-size="11">Trigger notification</text>
  <line x1="210" y1="399" x2="210" y2="415" stroke="black" stroke-width="1.5"/>

  <rect x="95" y="465" width="230" height="34" rx="12" ry="12" fill="white" stroke="black" stroke-width="1.5"/>
  <text x="210" y="486" text-anchor="middle" font-family="Arial" font-size="11">Send SMS and email</text>
  <line x1="210" y1="449" x2="210" y2="465" stroke="black" stroke-width="1.5"/>

  <!-- no path -->
  <text x="72" y="258" font-family="Arial" font-size="10">no</text>
  <rect x="30" y="315" width="150" height="34" rx="12" ry="12" fill="white" stroke="black" stroke-width="1.5"/>
  <text x="105" y="336" text-anchor="middle" font-family="Arial" font-size="10">Display error message</text>
  <line x1="150" y1="265" x2="105" y2="315" stroke="black" stroke-width="1.5"/>

  <!-- end -->
  <circle cx="210" cy="540" r="7" fill="black"/>
  <circle cx="210" cy="540" r="12" fill="none" stroke="black" stroke-width="1.5"/>
  <line x1="210" y1="499" x2="210" y2="528" stroke="black" stroke-width="1.5"/>
  <line x1="105" y1="349" x2="105" y2="540" stroke="black" stroke-width="1.5"/>
  <line x1="105" y1="540" x2="198" y2="540" stroke="black" stroke-width="1.5"/>
</svg>
